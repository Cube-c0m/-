<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>с днём рождения</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container {
  padding: 40px 20px;
  animation: fadeIn 1.5s ease;
}

h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.name {
  color: #ffcc70;
}

.subtitle {
  opacity: 0.8;
  margin-bottom: 30px;
}

.photo {
  width: 220px;
  height: 220px;
  margin: 0 auto 25px;
  border-radius: 20px;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.text {
  max-width: 500px;
  margin: auto;
  line-height: 1.6;
  font-size: 16px;
}

button {
  margin-top: 30px;
  padding: 15px 25px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #ffcc70;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.message {
  margin-top: 20px;
  font-size: 18px;
  color: #ffeaa7;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>с днём рождения, <span class="name">тапок на управлении</span> 🎉</h1>

<div class="subtitle">
сегодня твой день, так что официально разрешено кайфовать
</div>

<div class="photo">
<img src="friend.jpg">
</div>

<div class="text">
ты реально крутой чел, спасибо за все моменты и угар.  
пусть у тебя будет больше денег, меньше проблем  
и максимум кайфа в этом году.
</div>

<button onclick="showMsg()">нажми сюда</button>

<div class="message" id="msg"></div>

</div>

<script>
function showMsg() {
  document.getElementById("msg").innerText =
  "ладно без рофла — ты легенда ❤️";
}
</script>

</body>
</html>
